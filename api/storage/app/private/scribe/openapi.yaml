openapi: 3.0.3
info:
  title: 'Be Souhola CRM API Documentation'
  description: 'Besouhola CRM API (Laravel + Sanctum + Multi-tenant)'
  version: 1.0.0
servers:
  -
    url: 'http://127.0.0.1:8000'
tags:
  -
    name: Endpoints
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Get a token by calling <code>POST /api/auth/login</code> (tenant) or <code>POST /api/login</code> (central), then send it as <code>Authorization: Bearer ...</code>. For tenant-scoped requests, also send <code>X-Tenant-Id</code>.'
security:
  -
    default: []
paths:
  '/api/{any}':
    options:
      summary: ''
      operationId: optionsApiAny
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-Id
          description: ''
          example: '{TENANT_SLUG}'
          schema:
            type: string
      responses: {  }
      tags:
        - Endpoints
      security: []
    parameters:
      -
        in: path
        name: any
        description: ''
        example: '|{+-0p'
        required: true
        schema:
          type: string
  /api/login:
    get:
      summary: ''
      operationId: getApiLogin
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-Id
          description: ''
          example: '{TENANT_SLUG}'
          schema:
            type: string
      responses: {  }
      tags:
        - Endpoints
      security: []
    post:
      summary: ''
      operationId: postApiLogin
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-Id
          description: ''
          example: '{TENANT_SLUG}'
          schema:
            type: string
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: gbailey@example.net
                password:
                  type: string
                  description: ''
                  example: architecto
                subdomain:
                  type: string
                  description: ''
                  example: architecto
                  nullable: true
              required:
                - email
                - password
      security: []
  /api/tenants/register:
    post:
      summary: ''
      operationId: postApiTenantsRegister
      description: ''
      parameters:
        -
          in: header
          name: X-Tenant-Id
          description: ''
          example: '{TENANT_SLUG}'
          schema:
            type: string
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                company_name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                slug:
                  type: string
                  description: 'Must match the regex /^[a-z0-9\-]+$/. Must not be greater than 64 characters.'
                  example: 'n'
                admin_name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: g
                admin_email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: rowan.gulgowski@example.com
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: 'BNvYgxwmi/#iw/kX'
                plan:
                  type: string
                  description: ''
                  example: enterprise
                  enum:
                    - core
                    - basic
                    - professional
                    - enterprise
                    - custom
                  nullable: true
                modules:
                  type: array
                  description: 'The <code>slug</code> of an existing record in the modules table.'
                  example:
                    - architecto
                  items:
                    type: string
                company_type:
                  type: string
                  description: ''
                  example: 'Real Estate'
                  enum:
                    - General
                    - 'Real Estate'
                  nullable: true
                users_limit:
                  type: integer
                  description: 'Must be at least 1.'
                  example: 22
                  nullable: true
                start_date:
                  type: string
                  description: 'Must be a valid date.'
                  example: '2026-04-04T14:01:43'
                  nullable: true
                end_date:
                  type: string
                  description: 'Must be a valid date. Must be a date after or equal to <code>start_date</code>.'
                  example: '2052-04-27'
                  nullable: true
                is_lifetime:
                  type: boolean
                  description: ''
                  example: false
                  nullable: true
                country:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: 'n'
                address_line_1:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: g
                city:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: z
                state:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: m
              required:
                - company_name
                - slug
                - admin_name
                - admin_email
                - password
                - country
                - address_line_1
                - city
                - state
      security: []
  /api/auth/2fa/verify:
    post:
      summary: ''
