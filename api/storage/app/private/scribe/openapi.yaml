  /api/leads/duplicates/bulk-action:
    post:
      summary: 'Bulk actions for duplicate leads (stored inside leads table).'
      operationId: bulkActionsForDuplicateLeadsstoredInsideLeadsTable
      description: "Actions:\n- resolve_keep_original: deletes the duplicate lead and keeps original (uses meta_data.duplicate_of).\n- enable_duplicate: converts duplicate lead into a normal lead (clears duplicate flags/link).\n- transfer: assigns the duplicate lead to a new sales person (requires sales_id).\n- warn: sends notification about duplicates (uses meta_data.duplicate_of if original_lead_id not provided)."
      parameters:
        -
          in: header
          name: X-Tenant-Id
          description: ''
          example: '{TENANT_SLUG}'
          schema:
            type: string
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  description: ''
                  example: enable_duplicate
                  enum:
                    - resolve_keep_original
                    - keep_save
                    - keep_and_save
                    - enable_duplicate
                    - transfer
                    - warn
                lead_ids:
                  type: array
                  description: 'The <code>id</code> of an existing record in the leads table.'
                  example:
                    - 16
                  items:
                    type: integer
                sales_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the users table.'
                  example: 16
                  nullable: true
                original_lead_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the leads table.'
                  example: 16
                  nullable: true
                stage:
                  type: string
                  description: ''
                  example: new_lead
                  enum:
                    - same_stage
                    - new_lead
                    - cold_calls
                  nullable: true
                history_option:
                  type: string
                  description: ''
                  example: assign_as_new
                  enum:
                    - keep_history
                    - assign_as_new
                  nullable: true
              required:
                - action
      security: []
